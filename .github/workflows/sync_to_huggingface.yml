name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use force push to sync GitHub repository directly with Hugging Face Space
          # Note: Replace 'testforme2026/yvra-backend' with your actual Hugging Face Username/SpaceName if different
          git push --force https://oauth2:$HF_TOKEN@huggingface.co/spaces/testforme2026/yvra-backend main
